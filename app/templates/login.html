<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090b09">
  <title>Unlock AiOS</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card glass">
      <span class="brand-mark">A</span>
      <p class="eyebrow">{{ "Unlock" if has_pin else "First run" }}</p>
      <h1>{{ "Enter your PIN" if has_pin else "Set a local PIN" }}</h1>
      <p class="source-note">
        {{ "This keeps the dashboard private on shared desktop or LAN sessions." if has_pin else "Create a PIN before using AiOS on phone or local network." }}
      </p>
      {% if error %}
        <p class="auth-error">{{ error }}</p>
      {% endif %}
      <form class="settings-form" method="post" action="{{ url_for('main.unlock') }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label><span>PIN</span><input name="pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="4 to 12 digits" required></label>
        <button type="submit">{{ "Unlock" if has_pin else "Set PIN" }}</button>
      </form>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
